<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级书签 - Super Bookmark</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1 class="logo">超级书签</h1>
            <p class="subtitle">从浏览器收藏夹加载 · 支持编辑和删除</p>
            <nav class="primary-nav" id="primaryNav" aria-label="一级菜单"></nav>
            <div class="search-row">
                <select class="search-select" id="searchScope" aria-label="搜索范围">
                    <option value="all">综合</option>
                </select>
                <div class="search-box">
                    <input type="text" placeholder="站内搜索" aria-label="站内搜索" id="searchInput">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="secondary-nav" aria-label="二级菜单">
            <div class="secondary-nav-list" id="secondaryNavList"></div>
        </aside>

        <main class="content-main">
            <div id="contentArea">
                <div class="loading" id="loading">正在加载收藏夹…</div>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <p>暂无数据。请在浏览器书签栏创建一级、二级文件夹并添加书签。</p>
                </div>
                <div id="categoryPanel" style="display:none;">
                    <h2 class="category-title" id="categoryTitle"></h2>
                    <div class="tag-bar" id="tagBar"></div>
                    <div class="links-grid" id="linksGrid"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/newtab.js"></script>
</body>
</html>
